services:
  - type: web
    runtime: static
    name: portfolio-web
    buildCommand: npm ci && npm run build:web
    staticPublishPath: ./dist/web
    domains:
      - example.com
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_CMS_URL
        value: https://admin.example.com
      - key: VITE_PUBLIC_POSTHOG_KEY
        sync: false
      - key: VITE_PUBLIC_POSTHOG_HOST
        sync: false
      - key: VITE_EMAILJS_SERVICE_ID
        sync: false
      - key: VITE_EMAILJS_TEMPLATE_ID
        sync: false
      - key: VITE_EMAILJS_PUBLIC_KEY
        sync: false
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - package.json
        - package-lock.json
        - tsconfig.base.json
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

  - type: web
    runtime: static
    name: portfolio-cms
    buildCommand: npm ci && npm run build:cms
    staticPublishPath: ./dist/cms
    domains:
      - admin.example.com
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_PUBLIC_SITE_URL
        value: https://example.com
      - key: VITE_PUBLIC_POSTHOG_KEY
        sync: false
      - key: VITE_PUBLIC_POSTHOG_HOST
        sync: false
    buildFilter:
      paths:
        - apps/cms/**
        - packages/**
        - package.json
        - package-lock.json
        - tsconfig.base.json
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
